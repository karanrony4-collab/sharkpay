<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SharkPay Login - Secure Payment Gateway | SharkPay App</title>
  <meta name="description" content="Login to SharkPay - India's trusted USDT payment gateway. Secure login, instant deposits and withdrawals.">
  <meta name="keywords" content="SharkPay Login, SharkPay App, SharkPay Payment Gateway, Shark Pay, SharkPay Register">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://sharkpay.co.in/user-app/pages/login.html">
  
  <!-- Open Graph -->
  <meta property="og:title" content="SharkPay Login - Secure Payment Gateway">
  <meta property="og:description" content="Login to SharkPay - India's trusted USDT payment gateway. Secure login, instant deposits and withdrawals.">
  <meta property="og:url" content="https://sharkpay.co.in/user-app/pages/login.html">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  
  <!-- Schema.org JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "SharkPay",
    "url": "https://sharkpay.co.in",
    "description": "SharkPay - India's trusted USDT payment gateway",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service"
    }
  }
  </script>
  
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="login-page">

    <!-- Blue Header - Photo Exact Match -->
    <div class="login-header">
      <div class="login-header-left">
        <div class="shark-logo">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="44" height="44" rx="12" fill="url(#paint0_linear)"/>
            <path d="M8 26C8 26 10 18 18 16C18 16 16 20 20 22C20 22 22 14 30 13C30 13 26 19 28 22C28 22 32 18 36 20C36 20 30 24 28 28C28 28 25 25 22 26C22 26 20 30 16 30C16 30 18 27 17 25C17 25 13 28 8 26Z" fill="white"/>
            <path d="M30 13C30 13 32 10 35 9L33 14L30 13Z" fill="white" opacity="0.8"/>
            <circle cx="19" cy="20" r="1.5" fill="#1e40af"/>
            <defs>
              <linearGradient id="paint0_linear" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1e3a8a"/>
                <stop offset="1" stop-color="#2563eb"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="header-brand-name">SharkPay</span>
      </div>
      <a href="#" class="download-btn">Download</a>
    </div>

    <!-- Login Form Container -->
    <div class="login-container">
      <form id="loginForm">
        <div class="form-group">
          <i data-lucide="phone" class="input-icon"></i>
          <input type="tel" id="mobile" class="form-control" placeholder="Enter Your Phone Number" maxlength="10" required />
        </div>

        <div class="form-group">
          <i data-lucide="lock" class="input-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="Enter Password" required />
        </div>

        <div class="register-forgot-row">
          <a href="https://app-web.sharkpay-app.com/regist?code=0edatgwpa0j3" class="register-link">Register</a>
          <a href="#" class="forgot-link">Forget Password</a>
        </div>

        <div id="errorMessage" class="error-msg hidden"></div>

        <div class="login-btn-container">
          <button type="submit" class="btn-primary" id="loginBtn">LOG IN</button>
        </div>
      </form>
    </div>

    <!-- Limit Popup -->
    <div id="limitPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center;">
      <div style="background:#fff;padding:24px;border-radius:12px;max-width:90%;width:320px;text-align:center;">
        <div style="margin-bottom:16px;color:#f59e0b;">
          <i data-lucide="alert-triangle" style="width:48px;height:48px;margin:0 auto"></i>
        </div>
        <h3 style="font-size:18px;margin-bottom:12px;font-weight:600;color:#1f2937;">Update Request Already Received</h3>
        <p style="font-size:14px;color:#4b5563;margin-bottom:16px;line-height:1.5;">Please wait some time. You can use another link:</p>
        <a href="#" id="telegramLimitLink" style="display:inline-block;padding:10px 16px;background:#e0e7ff;color:#4f46e5;border-radius:8px;text-decoration:none;font-weight:600;word-break:break-all;">app-web.sharkpay-app.com</a>
      </div>
    </div>

  </div>

  <script type="module" src="../js/config/supabase.js"></script>
  <script type="module" src="../js/auth/login.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
