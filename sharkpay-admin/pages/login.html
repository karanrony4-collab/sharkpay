<!doctype html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - SharkPay</title>
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <div class="admin-login-wrapper">
      <div class="admin-login-box">
        <div class="admin-title">Admin Portal</div>
        <form id="adminLoginForm">
          <input
            type="email"
            id="email"
            class="admin-input"
            placeholder="admin@sharkpay.com"
            required
          />
          <input
            type="password"
            id="password"
            class="admin-input"
            placeholder="admin@0123"
            required
          />
          <div
            id="errorMsg"
            class="hidden text-red-500 text-center mb-4 text-sm"
          ></div>
          <button type="submit" class="admin-btn">Login</button>
        </form>
      </div>
    </div>

    <script type="module">
      import { supabase } from "../../user-app/js/config/supabase.js";

      document
        .getElementById("adminLoginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = e.target.querySelector("button");
          const err = document.getElementById("errorMsg");
          
          btn.textContent = "Loading...";
          btn.disabled = true;
          err.classList.add("hidden");

          try {
            const { data, error } = await supabase
              .from("admins")
              .select("*")
              .eq("email", email)
              .eq("password", password)
              .single();

            if (error || !data) {
              err.textContent = "Invalid credentials";
              err.classList.remove("hidden");
            } else {
              localStorage.setItem("SharkPay_admin_session", JSON.stringify(data));
              window.location.href = "./dashboard.html";
            }
          } catch (e) {
            console.error(e);
            err.textContent = "Something went wrong";
            err.classList.remove("hidden");
          } finally {
            btn.textContent = "Login";
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
